spring.application.name=endo-advice

# Datasource (local Postgres via docker-compose)
spring.datasource.url=jdbc:postgresql://localhost:5432/endo_advice
spring.datasource.username=endo
spring.datasource.password=endo_secret
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
