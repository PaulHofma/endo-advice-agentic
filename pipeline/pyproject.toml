[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "W", "F"]

[tool.ruff.lint.per-file-ignores]
# LLM prompt strings contain long lines that cannot be wrapped without altering prompt content
"synthesis.py" = ["E501"]
"verification.py" = ["E501"]
"summarise.py" = ["E501"]
"pmcfetch.py" = ["E501"]
