services:
  postgres:
    image: postgres:16-alpine
    container_name: endo-advice-db
    environment:
      POSTGRES_DB: endo_advice
      POSTGRES_USER: endo
      POSTGRES_PASSWORD: endo_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
